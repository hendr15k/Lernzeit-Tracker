<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lernzeit-Tracker</title>
  <style>
    :root { --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --border: #2e3347; --text: #e8eaf0; --text-muted: #8b8fa3; --accent: #6c8aff; --accent-hover: #8aa3ff; --danger: #ff6b6b; --success: #69db7c; --warning: #ffd43b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h2 { margin-top: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }
    .header-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.85; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
    .semester-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
    .semester-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; cursor: pointer; transition: border-color 0.15s; }
    .semester-card:hover { border-color: var(--accent); }
    .semester-card.active { border-color: var(--accent); background: rgba(108,138,255,0.08); }
    .semester-card h3 { font-size: 1rem; margin-bottom: 0.25rem; }
    .semester-card .meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .semester-card .ects { font-size: 0.85rem; color: var(--accent); font-weight: 600; }
    .module-list { margin-top: 0.75rem; }
    .module-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .module-item:hover { border-color: var(--accent); }
    .module-info h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
    .module-meta { display: flex; gap: 0.75rem; font-size: 0.78rem; color: var(--text-muted); flex-wrap: wrap; }
    .module-actions { display: flex; gap: 0.3rem; align-items: center; }
    .stats-bar { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1.25rem; flex: 1; min-width: 120px; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { margin-top: 0; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.3rem; }
    .form-group input { width: 100%; padding: 0.55rem 0.75rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-size: 0.9rem; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .modal-actions-left { display: flex; gap: 0.5rem; justify-content: space-between; margin-top: 1.25rem; }
    .empty { text-align: center; padding: 2rem; color: var(--text-muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .tab-bar { display: flex; gap: 0.25rem; margin-bottom: 1rem; background: var(--surface); border-radius: 10px; padding: 0.3rem; }
    .tab { flex: 1; padding: 0.5rem; text-align: center; border-radius: 7px; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); transition: all 0.15s; }
    .tab.active { background: var(--accent); color: #fff; }
    #import-file { display: none; }
    .progress-ring { width: 120px; height: 120px; margin: 0 auto 1rem; }
    .progress-ring circle { fill: none; stroke-width: 8; }
    .progress-ring .bg { stroke: var(--surface2); }
    .progress-ring .fg { stroke: var(--accent); stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 0.4s; }
    .progress-text { text-anchor: middle; dominant-baseline: central; font-size: 1.1rem; font-weight: 700; fill: var(--text); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
    .badge-soon { background: var(--warning); color: #000; }
    .badge-done { background: var(--success); color: #000; }
    .badge-upcoming { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .hidden { display: none !important; }
    .back-btn { display: inline-flex; align-items: center; padding: 0.4rem 0.8rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1rem; border: none; }
    .back-btn:hover { border-color: var(--accent); color: var(--text); }
    .semester-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
    .klausur-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 0.5rem; }
    .klausur-row:last-child { border-bottom: none; }
    .klausur-row .name { font-size: 0.9rem; }
    .klausur-row .sem-name { font-size: 0.75rem; color: var(--text-muted); }
    .empty-row { padding: 1rem; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } .stats-bar { flex-direction: column; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Lernzeit-Tracker</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportData()">Export</button>
      <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import</button>
      <input type="file" id="import-file" accept=".json" onchange="importData(event)">
      <button class="btn btn-primary" onclick="openSemesterModal()">+ Semester</button>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-semesters" onclick="switchTab('semesters')">Semester</div>
    <div class="tab" id="tab-dashboard" onclick="switchTab('dashboard')">Dashboard</div>
  </div>
  <div id="view-semesters">
    <div class="card">
      <h2>Semester</h2>
      <div id="semester-list"></div>
    </div>
    <div id="module-section" class="hidden">
      <button class="back-btn" onclick="state.activeSemesterId=null;render();">Zuruck</button>
      <div class="card">
        <div class="semester-header">
          <h2 id="active-semester-title">Module</h2>
          <button class="btn btn-primary btn-sm" onclick="openModuleModal()">+ Modul</button>
        </div>
        <div id="module-list" class="module-list"></div>
      </div>
    </div>
  </div>
  <div id="view-dashboard" class="hidden">
    <div class="card" style="text-align:center;">
      <svg class="progress-ring" viewBox="0 0 120 120">
        <circle class="bg" cx="60" cy="60" r="50"/>
        <circle class="fg" id="progress-ring-fg" cx="60" cy="60" r="50" stroke-dasharray="314.159" stroke-dashoffset="314.159"/>
        <text class="progress-text" x="60" y="60" id="progress-text">0%</text>
      </svg>
      <div style="font-size:0.85rem;color:var(--text-muted);" id="progress-label">Keine Daten</div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="card">
      <h2>Klausuren</h2>
      <div id="klausur-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="semester-modal" onclick="if(event.target===this)closeSemesterModal()">
  <div class="modal">
    <h2 id="sem-modal-title">Semester hinzufugen</h2>
    <input type="hidden" id="sem-id">
    <div class="form-group"><label>Name (z.B. 3. Semester)</label><input type="text" id="sem-name" placeholder="3. Semester"></div>
    <div class="form-row">
      <div class="form-group"><label>Start</label><input type="date" id="sem-start"></div>
      <div class="form-group"><label>Ende</label><input type="date" id="sem-end"></div>
    </div>
    <div class="modal-actions-left">
      <button class="btn btn-danger hidden" id="sem-delete-btn" onclick="deleteSemester()">Loschen</button>
      <div style="display:flex;gap:0.5rem;margin-left:auto;">
        <button class="btn btn-secondary" onclick="closeSemesterModal()">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveSemester()">Speichern</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="module-modal" onclick="if(event.target===this)closeModuleModal()">
  <div class="modal">
    <h2 id="mod-modal-title">Modul hinzufugen</h2>
    <input type="hidden" id="mod-id">
    <div class="form-group"><label>Name</label><input type="text" id="mod-name" placeholder="Hohere Mathematik I"></div>
    <div class="form-row">
      <div class="form-group"><label>ECTS</label><input type="number" id="mod-ects" min="0" max="30" step="0.5" placeholder="5"></div>
      <div class="form-group"><label>Lernstunden (geschetzt)</label><input type="number" id="mod-hours" min="0" max="1000" step="1" placeholder="150"></div>
    </div>
    <div class="form-group"><label>Klausurdatum</label><input type="date" id="mod-klausur"></div>
    <div class="form-group"><label>Notizen</label><input type="text" id="mod-notes" placeholder="Kapitel 1-5, Formelsammlung..."></div>
    <div class="modal-actions-left">
      <button class="btn btn-danger hidden" id="mod-delete-btn" onclick="deleteModule()">Loschen</button>
      <div style="display:flex;gap:0.5rem;margin-left:auto;">
        <button class="btn btn-secondary" onclick="closeModuleModal()">Abbrechen</button>
        <button class="btn btn-primary" onclick="saveModule()">Speichern</button>
      </div>
    </div>
  </div>
</div>

<script>
var STORAGE_KEY = "lernzeit_tracker_v1";
var state = { semesters: [], activeSemesterId: null };

function load() {
  try {
    var s = localStorage.getItem(STORAGE_KEY);
    state = s ? JSON.parse(s) : { semesters: [], activeSemesterId: null };
  } catch(e) { state = { semesters: [], activeSemesterId: null }; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function now() { return new Date().toISOString().split("T")[0]; }
function daysBetween(s, e) {
  if (!s || !e) return null;
  return Math.round((new Date(e) - new Date(s)) / 86400000);
}
function formatDate(d) {
  if (!d) return "-";
  return new Date(d + "T00:00:00").toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" });
}
function klausurBadge(date) {
  if (!date) return { cls: "", text: "" };
  var t = now();
  if (date < t) return { cls: "badge-done", text: "Bestanden" };
  var daysUntil = Math.round((new Date(date) - new Date(t)) / 86400000);
  if (daysUntil <= 14) return { cls: "badge-soon", text: daysUntil + " Tage" };
  return { cls: "badge-upcoming", text: formatDate(date) };
}
function switchTab(tab) {
  document.getElementById("tab-semesters").classList.toggle("active", tab === "semesters");
  document.getElementById("tab-dashboard").classList.toggle("active", tab === "dashboard");
  document.getElementById("view-semesters").classList.toggle("hidden", tab !== "semesters");
  document.getElementById("view-dashboard").classList.toggle("hidden", tab !== "dashboard");
}
function selectSemester(id) {
  state.activeSemesterId = id;
  render();
}
function render() {
  renderSemesters();
  renderModules();
  renderDashboard();
}
function renderSemesters() {
  var el = document.getElementById("semester-list");
  if (!state.semesters.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#128197;</div>Keine Semester vorhanden</div>';
    return;
  }
  var html = '<div class="semester-grid">';
  state.semesters.forEach(function(sem) {
    var active = sem.id === state.activeSemesterId ? "active" : "";
    var days = daysBetween(sem.start, sem.end);
    var totalEcts = (sem.modules||[]).reduce(function(a,m){ return a + (parseFloat(m.ects)||0); }, 0);
    var totalHours = (sem.modules||[]).reduce(function(a,m){ return a + (parseFloat(m.hours)||0); }, 0);
    html += '<div class="semester-card ' + active + '" onclick="selectSemester(\'' + sem.id + '\')">';
    html += '<h3>' + escHtml(sem.name||"Unbenannt") + '</h3>';
    html += '<div class="meta">' + (sem.start||"?") + ' &rarr; ' + (sem.end||"?") + (days ? " (" + days + " Tage)" : "") + '</div>';
    html += '<div class="ects">' + totalEcts + ' ECTS &middot; ' + totalHours + 'h</div>';
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function renderModules() {
  var section = document.getElementById("module-section");
  if (!state.activeSemesterId) { section.classList.add("hidden"); return; }
  section.classList.remove("hidden");
  var sem = state.semesters.find(function(s){ return s.id === state.activeSemesterId; });
  if (!sem) return;
  document.getElementById("active-semester-title").textContent = (sem.name||"Unbenannt") + " - Module";
  var el = document.getElementById("module-list");
  if (!sem.modules || !sem.modules.length) {
    el.innerHTML = '<div class="empty-row">Keine Module vorhanden</div>';
    return;
  }
  var html = "";
  sem.modules.forEach(function(mod) {
    var badge = klausurBadge(mod.klausur);
    html += '<div class="module-item">';
    html += '<div class="module-info">';
    html += '<h4>' + escHtml(mod.name||"Unbenannt") + '</h4>';
    html += '<div class="module-meta">';
    html += '<span>&#127991; ' + (mod.ects||0) + ' ECTS</span>';
    html += '<span>&#128337; ' + (mod.hours||0) + 'h</span>';
    if (mod.klausur) html += '<span>' + formatDate(mod.klausur) + '</span>';
    if (mod.notes) html += '<span style="font-style:italic;">' + escHtml(mod.notes) + '</span>';
    html += '</div></div>';
    html += '<div class="module-actions">';
    if (badge.text) html += '<span class="badge ' + badge.cls + '">' + badge.text + '</span>';
    html += '<button class="btn btn-secondary btn-sm" onclick="openModuleModal(\'' + mod.id + '\')">&#9998;</button>';
    html += '</div></div>';
  });
  el.innerHTML = html;
}
function renderDashboard() {
  var totalEcts = 0, totalHours = 0, totalKlausuren = 0, klausurenSoon = 0, done = 0;
  var allKlausuren = [];
  state.semesters.forEach(function(sem) {
    var semEcts = 0, semHours = 0;
    (sem.modules||[]).forEach(function(m) {
      semEcts += parseFloat(m.ects)||0;
      semHours += parseFloat(m.hours)||0;
      if (m.klausur) {
        totalKlausuren++;
        var badge = klausurBadge(m.klausur);
        if (badge.cls === "badge-done") done++;
        if (badge.cls === "badge-soon") klausurenSoon++;
        allKlausuren.push({ name: m.name, sem: sem.name, date: m.klausur, badge: badge });
      }
    });
    totalEcts += semEcts;
    totalHours += semHours;
  });
  var donePct = totalKlausuren ? Math.round(done/totalKlausuren*100) : 0;
  var circumference = 2 * Math.PI * 50;
  var offset = circumference - (donePct / 100) * circumference;
  document.getElementById("progress-ring-fg").setAttribute("stroke-dashoffset", offset);
  document.getElementById("progress-text").textContent = donePct + "%";
  document.getElementById("progress-label").textContent = done + " von " + totalKlausuren + " Klausuren bestanden";
  document.getElementById("stats-bar").innerHTML =
    '<div class="stat"><div class="stat-value">' + totalEcts + '</div><div class="stat-label">Gesamt ECTS</div></div>' +
    '<div class="stat"><div class="stat-value">' + totalHours + '</div><div class="stat-label">Lernstunden</div></div>' +
    '<div class="stat"><div class="stat-value">' + klausurenSoon + '</div><div class="stat-label">Klausuren bald</div></div>';
  var klausurEl = document.getElementById("klausur-list");
  if (!allKlausuren.length) {
    klausurEl.innerHTML = '<div class="empty-row">Keine Klausuren eingetragen</div>';
    return;
  }
  allKlausuren.sort(function(a,b){ return a.date.localeCompare(b.date); });
  var html = "";
  allKlausuren.forEach(function(k) {
    html += '<div class="klausur-row">';
    html += '<div><div class="name">' + escHtml(k.name) + '</div><div class="sem-name">' + escHtml(k.sem) + '</div></div>';
    html += '<span class="badge ' + k.badge.cls + '">' + k.badge.text + '</span>';
    html += '</div>';
  });
  klausurEl.innerHTML = html;
}
function openSemesterModal(id) {
  var modal = document.getElementById("semester-modal");
  var sem = id ? state.semesters.find(function(s){ return s.id === id; }) : null;
  document.getElementById("sem-modal-title").textContent = sem ? "Semester bearbeiten" : "Semester hinzufugen";
  document.getElementById("sem-id").value = id||"";
  document.getElementById("sem-name").value = sem ? sem.name : "";
  document.getElementById("sem-start").value = sem ? sem.start : "";
  document.getElementById("sem-end").value = sem ? sem.end : "";
  document.getElementById("sem-delete-btn").classList.toggle("hidden", !sem);
  modal.classList.remove("hidden");
}
function closeSemesterModal() { document.getElementById("semester-modal").classList.add("hidden"); }
function saveSemester() {
  var id = document.getElementById("sem-id").value;
  var name = document.getElementById("sem-name").value.trim();
  var start = document.getElementById("sem-start").value;
  var end = document.getElementById("sem-end").value;
  if (!name) { alert("Bitte Name eingeben"); return; }
  if (id) {
    var sem = state.semesters.find(function(s){ return s.id === id; });
    if (sem) { sem.name = name; sem.start = start; sem.end = end; }
  } else {
    state.semesters.push({ id: uid(), name: name, start: start, end: end, modules: [] });
  }
  save(); closeSemesterModal(); render();
}
function deleteSemester() {
  if (!confirm("Semester wirklich loschen?")) return;
  var id = document.getElementById("sem-id").value;
  state.semesters = state.semesters.filter(function(s){ return s.id !== id; });
  if (state.activeSemesterId === id) state.activeSemesterId = null;
  save(); closeSemesterModal(); render();
}
function openModuleModal(id) {
  var modal = document.getElementById("module-modal");
  var sem = state.semesters.find(function(s){ return s.id === state.activeSemesterId; });
  if (!sem) return;
  var mod = id ? sem.modules.find(function(m){ return m.id === id; }) : null;
  document.getElementById("mod-modal-title").textContent = mod ? "Modul bearbeiten" : "Modul hinzufugen";
  document.getElementById("mod-id").value = id||"";
  document.getElementById("mod-name").value = mod ? mod.name : "";
  document.getElementById("mod-ects").value = mod ? mod.ects : "";
  document.getElementById("mod-hours").value = mod ? mod.hours : "";
  document.getElementById("mod-klausur").value = mod ? mod.klausur : "";
  document.getElementById("mod-notes").value = mod ? mod.notes : "";
  document.getElementById("mod-delete-btn").classList.toggle("hidden", !mod);
  modal.classList.remove("hidden");
}
function closeModuleModal() { document.getElementById("module-modal").classList.add("hidden"); }
function saveModule() {
  var id = document.getElementById("mod-id").value;
  var name = document.getElementById("mod-name").value.trim();
  var ects = parseFloat(document.getElementById("mod-ects").value) || 0;
  var hours = parseFloat(document.getElementById("mod-hours").value) || 0;
  var klausur = document.getElementById("mod-klausur").value;
  var notes = document.getElementById("mod-notes").value.trim();
  if (!name) { alert("Bitte Name eingeben"); return; }
  var sem = state.semesters.find(function(s){ return s.id === state.activeSemesterId; });
  if (!sem) return;
  if (!sem.modules) sem.modules = [];
  if (id) {
    var mod = sem.modules.find(function(m){ return m.id === id; });
    if (mod) { mod.name = name; mod.ects = ects; mod.hours = hours; mod.klausur = klausur; mod.notes = notes; }
  } else {
    sem.modules.push({ id: uid(), name: name, ects: ects, hours: hours, klausur: klausur, notes: notes });
  }
  save(); closeModuleModal(); render();
}
function deleteModule() {
  if (!confirm("Modul wirklich loschen?")) return;
  var id = document.getElementById("mod-id").value;
  var sem = state.semesters.find(function(s){ return s.id === state.activeSemesterId; });
  if (sem) sem.modules = sem.modules.filter(function(m){ return m.id !== id; });
  save(); closeModuleModal(); render();
}
function exportData() {
  var blob = new Blob([JSON.stringify(state, null, 2)], {type: "application/json"});
  var a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "lernzeit-tracker-backup-" + now() + ".json"; a.click();
}
function importData(event) {
  var file = event.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (imported.semesters) {
        state = imported;
        save(); render();
        alert("Import erfolgreich!");
      } else {
        alert("Ungultige Datei");
      }
    } catch(err) { alert("Fehler beim Lesen: " + err.message); }
  };
  reader.readAsText(file);
  event.target.value = "";
}
load();
render();

</script>
